spring:
  application:
    name: my-agent
  ai:
    dashscope:
      api-key: ${ALI_API_KEY}
      chat:
        options:
          timeout: 180000
    mcp:
      client:
        enabled: true
        request-timeout: 120000
        stdio:
          servers-configuration: classpath:mcp-servers.json
      retry:
        max-attempts: 3
        backoff:
          initial-interval: 2000
          multiplier: 2
          max-interval: 10000
  datasource:
    url: jdbc:mysql://localhost:3306/my_agent?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: Zf9@Qv7!Lm2Xc8$HpT8+rK!2pWq9@Vx6$Mn
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

file:
  upload:
    path: ./uploads

server:
  port: 8123
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: space.huyuhao.myagent.controller
knife4j:
  enable: true
  setting:
    language: zh_cn


# DashScope SDK 配置（向量嵌入服务使用）
dashscope:
  api:
    key: ${ALI_API_KEY}
  embedding:
    model: text-embedding-v3

milvus:
  host: localhost        # Milvus 服务地址
  port: 19530            # Milvus 端口
  username: ""           # 用户名（空表示无认证）
  password: ""           # 密码
  database: default      # 数据库名
  timeout: 10000         # 连接超时（毫秒）

# 为linux准备的
---
spring:
  config:
    activate:
      on-profile: prod
  data:
    redis:
      host: redis
  datasource:
    url: jdbc:mysql://mysql:3306/my_agent?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
  ai:
    mcp:
      client:
        stdio:
          servers-configuration: classpath:mcp-servers-linux.json