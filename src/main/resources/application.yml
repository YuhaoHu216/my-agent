spring:
  application:
    name: my-agent
  ai:
    dashscope:
      api-key: ${ALI_API_KEY}
      chat:
        options:
          timeout: 180000
      vectorstore:
        pgvector:
          index-type: HNSW
          dimension: 1536
          distance: COSINE_DISTANCE
          max-document-batch-size: 10000
    mcp:
      client:
        enabled: true
        request-timeout: 120000
        stdio:
          servers-configuration: classpath:mcp-servers.json
      retry:
        max-attempts: 3
        backoff:
          initial-interval: 2000
          multiplier: 2
          max-interval: 10000
  datasource:
    url: jdbc:mysql://localhost:3306/my_agent?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: Zf9@Qv7!Lm2Xc8$HpT8+rK!2pWq9@Vx6$Mn
    driver-class-name: com.mysql.cj.jdbc.Driver
server:
  port: 8123
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: space.huyuhao.myagent.controller
knife4j:
  enable: true
  setting:
    language: zh_cn

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://mysql:3306/my_agent?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
  ai:
    mcp:
      client:
        stdio:
          servers-configuration: classpath:mcp-servers-linux.json