# ===================== Redis 持久化配置 =====================

# ----- RDB 快照持久化 -----
# 格式: save <秒数> <修改次数>
# 每 60 秒内至少有 1 个 key 被修改，执行一次快照保存
save 60 1
# 每 300 秒内至少有 10 个 key 被修改，执行一次快照保存
save 300 10
# 每 3600 秒内至少有 10000 个 key 被修改，执行一次快照保存
save 3600 10000

# RDB 文件名
dbfilename dump.rdb
# 工作目录（数据保存在 /data，已通过 volume 映射到宿主机）
dir /data

# 快照压缩（开启以节省磁盘空间）
rdbcompression yes
# 快照校验（开启以确保数据完整性）
rdbchecksum yes

# ----- AOF 持久化 -----
# 开启 AOF
appendonly yes
# AOF 文件名
appendfilename "appendonly.aof"

# AOF 同步策略: everysec 每秒同步一次，最多丢失 1 秒数据
appendfsync everysec

# 混合持久化：AOF 文件前半段是 RDB 快照，后半段是增量命令
# 兼顾恢复速度与数据安全（Redis 7 默认开启）
aof-use-rdb-preamble yes
