services:
  redis:
    image: redis:7.4-alpine
    container_name: redis-my_agent
    ports:
      - "6379:6379"
    volumes:
      - ./backend/redis/data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - my_agent-net

  mysql:
    image: mysql:8.0
    container_name: mysql-my_agent
    ports:
      - "3306:3306"
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: Zf9@Qv7!Lm2Xc8$HpT8+rK!2pWq9@Vx6$Mn
      MYSQL_DATABASE: my_agent
    volumes:
      - "./backend/mysql/conf:/etc/mysql/conf.d"
      - "./backend/mysql/data:/var/lib/mysql"
      - "./backend/mysql/init:/docker-entrypoint-initdb.d"
    networks:
      - my_agent-net

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: etcd-milvus
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - my_agent-net

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: minio-milvus
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - my_agent-net

  milvus:
    image: milvusdb/milvus:v2.5.10
    container_name: milvus
    command: milvus run standalone
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    networks:
      - my_agent-net
    deploy:
      resources:
        limits:
          memory: 2G
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy

  attu:
    image: zilliz/attu:v2.5
    container_name: attu
    ports:
      - "8000:3000"
    environment:
      MILVUS_URL: milvus:19530
    depends_on:
      - milvus
    networks:
      - my_agent-net

  my_agent:
    environment:
        - SPRING_PROFILES_ACTIVE=prod
        - ALI_API_KEY=sk-6d09a66691804ef485f400654b31a711
    build:
      context: .
      dockerfile: ./dockerfile
    volumes:
      - ./uploads:/uploads
    container_name: my_agent
    ports:
      - "8123:8123"
    networks:
      - my_agent-net
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_healthy
      milvus:
        condition: service_started

  nginx:
    image: nginx
    container_name: nginx-my_agent
    ports:
      - "5173:5173"
    volumes:
      - "./frontend/nginx/nginx.conf:/etc/nginx/nginx.conf"
      - "./frontend/nginx/html:/usr/share/nginx/html"
    depends_on:
      - my_agent
    networks:
      - my_agent-net

networks:
  my_agent-net:
    name: my_agent

volumes:
  milvus_data:
  etcd_data:
  minio_data:
